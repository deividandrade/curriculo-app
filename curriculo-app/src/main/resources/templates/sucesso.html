<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Currículo Cadastrado!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link
	href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="success-page">
		<div class="success-card">
			<div class="success-icon"></div>
			<h1>Currículo Cadastrado!</h1>
			<p th:if="${sucesso}" th:text="${sucesso}"></p>
			<p th:unless="${sucesso}">Seu currículo foi salvo com sucesso.</p>
			<div class="success-actions">
				<a th:href="@{/curriculo/cadastro}" class="btn btn-next">Novo
					Cadastro</a> <a th:href="@{/curriculo/lista}" class="btn btn-prev">Ver
					Todos</a>
			</div>
		</div>
	</div>
</body>
</html>
