<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Currículos Cadastrados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link
	href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
	rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="lista-page">
		<div class="lista-header">
			<h1>
				Currículos <span class="highlight">Cadastrados</span>
			</h1>
			<a th:href="@{/curriculo/cadastro}" class="btn btn-next">+ Novo
				Currículo</a>
		</div>

		<div th:if="${curriculos.empty}" class="empty-state">
			<p>Nenhum currículo cadastrado ainda.</p>
		</div>

		<div class="curriculos-grid" th:unless="${curriculos.empty}">
			<div class="curriculo-card" th:each="c : ${curriculos}">
				<div class="card-header">
					<h3 th:text="${c.nomeCompleto}">Nome</h3>
					<span class="card-badge" th:text="${c.estado}">UF</span>
				</div>
				<p class="card-email" th:text="${c.email}">email</p>
				<p class="card-cidade" th:text="${c.cidade + ' - ' + c.estado}"
					th:if="${c.cidade}">Cidade</p>
				<div class="card-tags"
					th:if="${c.habilidades != null and !c.habilidades.empty}">
					<span class="tag" th:each="h, i : ${c.habilidades}"
						th:if="${i.index < 4}" th:text="${h}"></span>
				</div>
				<p class="card-date"
					th:text="'Cadastrado em ' + ${#temporals.format(c.criadoEm, 'dd/MM/yyyy')}"></p>
			</div>
		</div>
	</div>
</body>
</html>
